name: Nightly Room E2E

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: Optional production URL override
        required: false
        type: string
      git_ref:
        description: Optional ref to check out
        required: false
        type: string
      room:
        description: Optional CI room override
        required: false
        type: string

permissions:
  contents: read

jobs:
  webkit:
    name: webkit
    runs-on: ubuntu-latest
    concurrency:
      group: shared-room-e2e-${{ vars.CI_HLS_ROOM || 'default-room' }}
      cancel-in-progress: false
    env:
      ROOM: ${{ github.event_name == 'workflow_dispatch' && inputs.room || vars.CI_HLS_ROOM }}
      BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || vars.CI_HLS_PROD_BASE_URL }}
      GIT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || 'main' }}
      HLS_TEST_INVITE_CODE: ${{ secrets.CI_HLS_INVITE_CODE }}
      HLS_E2E_FAIL_ON_NON_PLAYABLE_ROOM: "1"
      CI_SUPABASE_URL: ${{ vars.CI_SUPABASE_URL }}
      CI_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.GIT_REF }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright WebKit
        run: pnpm exec playwright install --with-deps webkit

      - name: Reset CI room
        run: pnpm tsx scripts/hls/resetCiRoom.ts --room "$ROOM" --start-offset-sec -90

      - name: Run room E2E
        run: pnpm test:hls:room -- --room "$ROOM" --base-url "$BASE_URL" --project room-e2e-webkit

      - name: Upload Playwright artifacts
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-room-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore
          retention-days: 14
